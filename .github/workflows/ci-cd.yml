name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PROJECT_ID: gymx3-494520
  REGION: europe-west4
  REPOSITORY: gym-repo
  BACKEND_IMAGE: europe-west4-docker.pkg.dev/gymx3-494520/gym-repo/backend
  FRONTEND_IMAGE: europe-west4-docker.pkg.dev/gymx3-494520/gym-repo/frontend

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: macroscanner.settings
          MONGO_URI: mongodb://localhost:27017/test

  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: [test-frontend, test-backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            -f infrastructure/docker/backend.Dockerfile \
            .

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            -f infrastructure/docker/frontend.Dockerfile \
            .

      - name: Push Backend Image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy gym-backend \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "MONGO_URI=${{ secrets.MONGO_URI }},DJANGO_SETTINGS_MODULE=macroscanner.settings"

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy gym-frontend \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      - name: Get Backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe gym-backend --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Backend deployed at: $BACKEND_URL"

      - name: Get Frontend URL
        run: |
          FRONTEND_URL=$(gcloud run services describe gym-frontend --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Frontend deployed at: $FRONTEND_URL"
